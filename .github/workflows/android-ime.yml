name: Android IME

on:
  push:
    paths:
      - "android-ime/**"
      - ".github/workflows/android-ime.yml"
  pull_request:
    paths:
      - "android-ime/**"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: android-ime

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: >-
            tools
            platform-tools
            platforms;android-34
            build-tools;34.0.0

      - name: Ensure Gradle wrapper (Unix)
        run: |
          if [ ! -f gradlew ]; then
            curl -fsSL -o gradlew https://raw.githubusercontent.com/gradle/gradle/v8.9.0/gradlew
            chmod +x gradlew
          fi
          if [ ! -f gradle/wrapper/gradle-wrapper.jar ]; then
            mkdir -p gradle/wrapper
            curl -fsSL -o gradle/wrapper/gradle-wrapper.jar \
              https://raw.githubusercontent.com/gradle/gradle/v8.9.0/gradle/wrapper/gradle-wrapper.jar
          fi

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          build-root-directory: android-ime
          cache-dependency-path: android-ime/**/*.gradle*

      - name: Assemble debug APK
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: android-ime/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
